<section class="page">
  <h1>Sales Report</h1>
  <p class="subtitle">Restaurante actual: <strong>{{ restaurantName }}</strong></p>

  <div class="actions">
    <button mat-raised-button color="primary" (click)="loadReport()" [disabled]="loading">
      Refrescar reporte
    </button>
  </div>

  @if (loading) {
  <p>Cargando reporte...</p>
  }

  @if (error) {
  <p class="error">{{ error }}</p>
  }

  @if (report) {
  <mat-card class="report-card">
    <mat-card-title>Resumen de ventas</mat-card-title>
    <mat-card-content>
      <p><strong>Restaurant ID:</strong> {{ report.restaurantId }}</p>
      <p><strong>Órdenes pagadas:</strong> {{ report.paidOrders }}</p>
      <p><strong>Total vendido:</strong> ${{ report.totalSales }}</p>
    </mat-card-content>
  </mat-card>
  }
</section>
